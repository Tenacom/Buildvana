name: Build, test, and pack

on:
  push:
    branches: [ main, 'v[0-9]+.[0-9]+' ]
  pull_request:
    branches: [ main, 'v[0-9]+.[0-9]+' ]

jobs:
  build_test_pack:
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: 'true'
      DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
      DOTNET_CLI_UI_LANGUAGE: 'en-US'
      FEEDZ_IO_PRIVATE_TOKEN: ${{ secrets.FEEDZ_IO_PRIVATE_TOKEN }}
    steps:
    - name: Set bogus local NuGet package directory
      shell: cmd
      run: echo NUGET_LOCAL_PACKAGES=%RUNNER_TEMP% >> %GITHUB_ENV%
    - name: Checkout repository with full history
      uses: actions/checkout@v5
      with:
        fetch-depth: 0 # Checkout with full history so nbgv can compute Git height correctly.
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json
    - name: Restore .NET tools
      shell: cmd
      run: dotnet tool restore
    - name: Build, test, and pack with Buildvana
      shell: cmd
      run: |
        if [%BV_VERBOSITY%]==[] set BV_VERBOSITY=Normal
        if [%RUNNER_DEBUG%]==[1] set BV_VERBOSITY=Diagnostic
        dotnet bv pack --verbosity %BV_VERBOSITY%
    - name: Upload coverage to Codecov
      if: ${{ hashFiles('TestResults/Cobertura.xml') != '' }}
      uses: codecov/codecov-action@v5
      with:
        working-directory: TestResults
        files: Cobertura.xml
        verbose: true
