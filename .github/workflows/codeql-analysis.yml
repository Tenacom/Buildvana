name: "CodeQL"

on:
  push:
    branches: [ main, 'v[0-9]+.[0-9]+' ]
  pull_request:
    branches: [ main, 'v[0-9]+.[0-9]+' ]
  schedule:
    - cron: '38 16 * * 6' # At 4:38PM, every Saturday

jobs:
  analyze:
    name: Analyze
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: 'true'
      DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
      DOTNET_CLI_UI_LANGUAGE: 'en-US'
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'csharp' ] # https://aka.ms/codeql-docs/language-support
    steps:
    - name: Set bogus local NuGet package directory
      shell: cmd
      run: echo NUGET_LOCAL_PACKAGES=%RUNNER_TEMP% >> %GITHUB_ENV%
    - name: Checkout repository with full history
      uses: actions/checkout@v5
      with:
        fetch-depth: 0 # Checkout with full history so nbgv can compute Git height correctly.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        queries: security-and-quality
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json
    - name: Restore .NET tools
      run: dotnet tool restore
    - name: Build solution
      shell: cmd
      run: |
        if [%BV_VERBOSITY%]==[] set BV_VERBOSITY=Normal
        if [%RUNNER_DEBUG%]==[1] set BV_VERBOSITY=Diagnostic
        dotnet bv build --verbosity %BV_VERBOSITY%
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
